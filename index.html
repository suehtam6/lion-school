<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion School</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/pages/preview.js" defer type="module"></script>
</head>
<body>
    <header>
        <div class="topo">
            <img src="./img/logo.png" alt="imagem da logo">
            <div class="caixa-saida">
                <img src="./img/sair.png" alt="imagem da saida">
                <span onclick="a">Sair</span>
            </div>
        </div>
    </header>

    <main id="main">
        <div id="result"></div>
    </main>

    <footer>
        <div class="contatos">
            <div class="caixa-info">
                <div class="contato">
                    <img src="./img/telefone.png" alt="telefone para contato">
                    <span class="separar">(11) 4774-4700</span>
                </div>

                <div class="contato">
                    <img src="./img/icon-email.png" alt="e-mail para contato">
                    <span>lionschool@gmail.com</span>
                </div>

                <div class="contato">
                    <img src="./img/mapa.png" alt="endereço para contato">
                    <span>Rua tcc, 211,  Centro, Jandira</span>
                </div>
            </div>

            <span>Copyright © 2026 | Matheus Lucas</span>

            <div class="caixa-aplicativos">
                <img src="./img/youtube.png" alt="logo do youtube">
                <img src="./img/twitter.png" alt="logo do twitter">
                <img src="./img/instagram.png" alt="logo do instagram">
                <img src="./img/facebook.png" alt="logo do facebook">

            </div>

        </div>

    </footer>
</body>
</html>
